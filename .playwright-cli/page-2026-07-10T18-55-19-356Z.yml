        - generic [ref=f1e184]:
          - paragraph [ref=f1e185]: Why I built HoldType
          - heading "I wanted a dictation tool. Not all the bullshit." [level=2] [ref=f1e186]
          - paragraph [ref=f1e187]: I wanted to know who charged me and why every transcript had to be rewritten by a second model. I did not want another black box between my voice and the cursor.
          - paragraph [ref=f1e188]: In my daily work, OpenAI transcription gave me the first pass I trusted most often. The optional rewrite pass stays off unless I turn it on.
          - paragraph [ref=f1e189]: "HoldType is the native Swift app I built for that: your API key, direct OpenAI billing, no product account, and no monthly fee."
