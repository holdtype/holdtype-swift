          - generic [ref=f1e131]:
            - paragraph [ref=f1e132]: Recovery and control
            - heading "Keep the transcript when insertion fails." [level=2] [ref=f1e133]
            - paragraph [ref=f1e134]: If insertion fails, the accepted transcript remains available as Last Result. Paste it with Control + Command + V without replacing the macOS system clipboard.
            - paragraph [ref=f1e135]: Model-based OpenAI correction is off by default. The menu bar keeps dictation, translation, recovery, history, and settings together.
