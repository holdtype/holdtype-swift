        - heading "What “honest” means for HoldType" [level=2] [ref=f1e72]
        - generic [ref=f1e73]:
          - article [ref=f1e74]:
            - paragraph [ref=f1e75]: "01"
            - heading "Your OpenAI key. Direct billing." [level=3] [ref=f1e76]
            - paragraph [ref=f1e77]: OpenAI charges the OpenAI Platform account connected through your key. HoldType adds no monthly fee.
          - article [ref=f1e78]:
            - paragraph [ref=f1e79]: "02"
            - heading "gpt-4o-transcribe model" [level=3] [ref=f1e80]
            - paragraph [ref=f1e81]: OpenAI reports fewer word errors, better language recognition, and higher accuracy than its original Whisper models.
          - article [ref=f1e82]:
            - paragraph [ref=f1e83]: "03"
            - heading "No mandatory second pass" [level=3] [ref=f1e84]
            - paragraph [ref=f1e85]: By default, the transcript returns without a second model pass. Turn correction on only when you want it.
          - article [ref=f1e86]:
            - paragraph [ref=f1e87]: "04"
            - heading "The HoldType data path is explicit" [level=3] [ref=f1e88]
            - paragraph [ref=f1e89]: Your Mac → OpenAI → your cursor.
          - article [ref=f1e90]:
            - paragraph [ref=f1e91]: "05"
            - heading "The limits are visible" [level=3] [ref=f1e92]
            - paragraph [ref=f1e93]: HoldType is Mac-only. It does not pretend to be a team cloud platform; optional recording-cache retention stays local.
    - region [ref=f1e94]:
      - generic [ref=f1e95]:
        - generic [ref=f1e96]:
          - heading "A dictation app. Not an AI writing platform." [level=2] [ref=f1e97]
          - paragraph [ref=f1e98]: "HoldType does three practical jobs: text at the cursor, translation on command, and spelling context for names and technical terms."
        - generic [ref=f1e99]:
          - article [ref=f1e100]:
            - generic [ref=f1e101]: "01"
            - heading "Dictation where you work" [level=3] [ref=f1e102]
            - paragraph [ref=f1e103]: Dictate prompts directly into Codex, Claude, or ChatGPT. No intermediate editor and no required rewrite stage.
          - article [ref=f1e104]:
            - generic [ref=f1e105]: "02"
            - heading "No intermediate editor" [level=3] [ref=f1e106]
            - paragraph [ref=f1e107]: Dictate mail, reviews, documentation, chats, and notes directly at the cursor.
          - article [ref=f1e108]:
            - generic [ref=f1e109]: "03"
            - heading "Translation when requested" [level=3] [ref=f1e110]
            - paragraph [ref=f1e111]: Use the translation shortcut when you want it. Ordinary dictation does not trigger a translation request.
    - region [ref=f1e112]:
      - generic [ref=f1e113]:
        - heading "Product features" [level=2] [ref=f1e114]
        - paragraph [ref=f1e115]: The current HoldType app and the product screenshots use an English interface.
        - article [ref=f1e116]:
          - generic [ref=f1e117]:
            - paragraph [ref=f1e118]: Language and vocabulary
            - heading "Translate only when you ask for it." [level=2] [ref=f1e119]
            - paragraph [ref=f1e120]: Choose a target language, then use Right Command + Right Option. Translation runs as a separate text request after transcription.
            - paragraph [ref=f1e121]: Local Dictionary entries add spelling context for names, project terms, and file names to the transcription request.
          - figure "Real HoldType Translation settings. On phones, swipe the focused crop horizontally to inspect it." [ref=f1e122]:
